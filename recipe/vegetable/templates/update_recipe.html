<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <title>Recipes Page</title>
</head>
<body>
    <div class="container mt-5">
        
        <form class="col-6 mx-auto card p-3 shadow-lg" method="post" enctype="multipart/form-data"> <!--enctype is must to send image in backend--> 
            {% csrf_token %}
            <h2 style="text-align:center;">Update Recipe</h2>
            <hr>
            <div class="mb-3">
              <label for="name" class="form-label">Recipe Name</label>
              <input name="recipe_name" type="text" class="form-control" id="name" value="{{recipe.name}}">
            </div>

            <div class="mb-3">
              <label for="desc" class="form-label">Description</label>
              <textarea  name="recipe_description" class="form-control" >{{recipe.description}}</textarea>
            </div>

            <div class="mb-3">
              <label for="img" class="form-label">Image</label>
              <input name="recipe_image" type="file" class="form-control" id="img">
            </div>

            
            <button type="submit" class="btn btn-success">Update Recipe</button>
          </form>
        </div>
</body>
</html>
